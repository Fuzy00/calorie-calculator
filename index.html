<style>
  :root{
    --bg: #14171A;
    --card: #1C201D;
    --card-raised: #22261F;
    --ink: #ECEFE9;
    --ink-soft: #8FA097;
    --line: #2C322B;
    --amber: #E8A33D;
    --amber-soft: rgba(232,163,61,0.14);
    --coral: #D97757;
    --sage: #7FA88A;
    --track: #2C322B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:calc(40px + env(safe-area-inset-top)) 24px calc(64px + env(safe-area-inset-bottom));
  }
  header{ margin-bottom:28px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 10px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(28px, 4vw, 40px);
    margin:0 0 8px;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .sub{
    color:var(--ink-soft);
    font-size:15px;
    max-width:540px;
    line-height:1.5;
    margin:0;
  }
  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
    margin-top:32px;
    align-items:start;
  }
  @media (max-width: 760px){ .grid{grid-template-columns: 1fr;} }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px;
  }
  .card h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:18px;
    margin:0 0 20px;
    color:var(--ink);
  }
  .field{ margin-bottom:18px; }
  .field label{
    display:block;
    font-size:12px;
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .row{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  input[type=number], select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-family:'Work Sans', sans-serif;
    font-size:15px;
    color:var(--ink);
    background:var(--card-raised);
    appearance:none;
  }
  select{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238FA097'/></svg>");
    background-repeat:no-repeat;
    background-position: right 12px center;
    padding-right:30px;
  }
  input:focus, select:focus{
    outline:2px solid var(--amber);
    outline-offset:1px;
    border-color:var(--amber);
  }
  .segmented{
    display:flex;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .segmented button{
    flex:1;
    padding:9px 0;
    border:none;
    background:var(--card-raised);
    font-family:'Work Sans', sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .segmented button.active{ background:var(--amber); color:#1C1204; }
  .segmented button:focus-visible{ outline:2px solid var(--amber); outline-offset:-2px; }
  .goal-list{ display:flex; flex-direction:column; gap:8px; }
  .goal-opt{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    color:var(--ink);
  }
  .goal-opt input{ width:auto; margin:0; accent-color:var(--amber); }
  .goal-opt.active{ border-color:var(--amber); background:var(--amber-soft); }

  /* Output card */
  .output{ display:flex; flex-direction:column; align-items:center; text-align:center; }
  .dial{ position:relative; width:220px; height:220px; margin:6px 0 18px; }
  .dial svg{ transform: rotate(-90deg); }
  .dial-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .dial-num{ font-family:'Fraunces', serif; font-weight:600; font-size:40px; line-height:1; color:var(--ink); }
  .dial-unit{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--ink-soft); margin-top:6px;
  }
  .breakdown{ width:100%; display:flex; flex-direction:column; gap:2px; margin-top:8px; }
  .bline{ display:flex; justify-content:space-between; font-size:14px; padding:10px 0; border-top:1px solid var(--line); }
  .bline:first-child{ border-top:none; }
  .bline .label{ color:var(--ink-soft); }
  .bline .val{ font-family:'IBM Plex Mono', monospace; color:var(--ink); }

  /* Macro mode */
  .macro-mode-toggle{
    display:flex;
    gap:8px;
    margin-top:22px;
    width:100%;
  }
  .macro-mode-toggle button{
    flex:1;
    padding:8px 0;
    border:1px solid var(--line);
    border-radius:8px;
    background:transparent;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .macro-mode-toggle button.active{
    border-color:var(--amber);
    color:var(--amber);
    background:var(--amber-soft);
  }

  .manual-panel{
    width:100%;
    margin-top:16px;
    display:none;
    flex-direction:column;
    gap:14px;
  }
  .manual-panel.visible{ display:flex; }
  .macro-slider{ text-align:left; }
  .macro-slider .ms-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
  }
  .macro-slider .ms-name{
    font-size:13px;
    font-weight:500;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.protein{ background:var(--sage); }
  .dot.carb{ background:var(--amber); }
  .dot.fat{ background:var(--coral); }
  .macro-slider .ms-pct{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--ink-soft);
  }
  input[type=range]{
    width:100%;
    -webkit-appearance:none;
    height:6px;
    border-radius:3px;
    background:var(--track);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--amber);
    cursor:pointer;
    border:2px solid var(--bg);
  }
  input[type=range]#proteinSlider::-webkit-slider-thumb{ background:var(--sage); }
  input[type=range]#fatSlider::-webkit-slider-thumb{ background:var(--coral); }
  input[type=range]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%;
    background:var(--amber); cursor:pointer; border:2px solid var(--bg);
  }
  .sum-note{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
  }
  .sum-note.warn{ color:var(--coral); }

  .macros{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:10px;
    width:100%;
    margin-top:18px;
  }
  .macro{ border:1px solid var(--line); border-radius:10px; padding:12px 8px; background:var(--card-raised); }
  .macro .m-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--ink-soft);
  }
  .macro .m-val{ font-family:'Fraunces', serif; font-size:20px; margin-top:4px; color:var(--ink); }
  .macro .m-g{ font-size:11px; color:var(--ink-soft); }

  footer{ margin-top:28px; font-size:12px; color:var(--ink-soft); line-height:1.6; max-width:640px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Energy balance · 001</p>
    <h1>Calorie Calculator</h1>
  </header>

  <div class="grid">
    <div class="card">
      <h2>Your details</h2>

      <div class="row">
        <div class="field">
          <label>Age</label>
          <input type="number" id="age" value="20" min="14" max="100">
        </div>
        <div class="field">
          <label>Weight (kg)</label>
          <input type="number" id="weight" value="83" min="20">
        </div>
      </div>

      <div class="field">
        <label>Height (cm)</label>
        <input type="number" id="height" value="172" min="100">
      </div>

      <div class="field">
        <label>Activity level</label>
        <select id="activity">
          <option value="1.2">Sedentary — little to no exercise</option>
          <option value="1.375">Light — exercise 1–3 days/week</option>
          <option value="1.55">Moderate — exercise 3–5 days/week</option>
          <option value="1.725" selected>Active — exercise 6–7 days/week</option>
          <option value="1.9">Very active — hard training or physical job</option>
        </select>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Goal</label>
        <div class="goal-list" id="goalList">
          <label class="goal-opt active"><input type="radio" name="goal" value="0" checked> Maintain weight</label>
          <label class="goal-opt"><input type="radio" name="goal" value="-250"> Mild loss (~0.25 kg/week)</label>
          <label class="goal-opt"><input type="radio" name="goal" value="-500"> Loss (~0.5 kg/week)</label>
          <label class="goal-opt"><input type="radio" name="goal" value="250"> Mild gain (~0.25 kg/week)</label>
          <label class="goal-opt"><input type="radio" name="goal" value="500"> Gain (~0.5 kg/week)</label>
        </div>
      </div>
    </div>

    <div class="card output">
      <h2 style="align-self:flex-start;">Your estimate</h2>
      <div class="dial">
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r="94" fill="none" stroke="var(--track)" stroke-width="14"/>
          <circle id="dialRing" cx="110" cy="110" r="94" fill="none" stroke="var(--amber)" stroke-width="14"
                  stroke-linecap="round" stroke-dasharray="590.6" stroke-dashoffset="590.6"/>
        </svg>
        <div class="dial-center">
          <div class="dial-num" id="targetCals">—</div>
          <div class="dial-unit">kcal / day target</div>
        </div>
      </div>

      <div class="breakdown">
        <div class="bline"><span class="label">BMR (resting burn)</span><span class="val" id="bmrVal">—</span></div>
        <div class="bline"><span class="label">TDEE (with activity)</span><span class="val" id="tdeeVal">—</span></div>
        <div class="bline"><span class="label">Goal adjustment</span><span class="val" id="adjVal">—</span></div>
      </div>

      <div class="manual-panel visible" id="manualPanel">
        <div class="macro-slider">
          <div class="ms-top">
            <span class="ms-name"><span class="dot protein"></span>Protein</span>
            <span class="ms-pct" id="proteinPctLabel">25%</span>
          </div>
          <input type="range" id="proteinSlider" min="5" max="60" value="25">
        </div>
        <div class="macro-slider">
          <div class="ms-top">
            <span class="ms-name"><span class="dot fat"></span>Fat</span>
            <span class="ms-pct" id="fatPctLabel">15%</span>
          </div>
          <input type="range" id="fatSlider" min="5" max="60" value="15">
        </div>
        <div class="macro-slider">
          <div class="ms-top">
            <span class="ms-name"><span class="dot carb"></span>Carbs</span>
            <span class="ms-pct" id="carbPctLabel">60%</span>
          </div>
          <input type="range" id="carbSlider" min="5" max="70" value="60">
        </div>
        <div class="sum-note" id="sumNote">Total: 100%</div>
      </div>

      <div class="macros">
        <div class="macro"><div class="m-label">Protein</div><div class="m-val" id="proteinG">—</div><div class="m-g">g / day</div></div>
        <div class="macro"><div class="m-label">Fat</div><div class="m-val" id="fatG">—</div><div class="m-g">g / day</div></div>
        <div class="macro"><div class="m-label">Carbs</div><div class="m-val" id="carbG">—</div><div class="m-g">g / day</div></div>
      </div>
    </div>
  </div>


</div>

<script>
  const $ = id => document.getElementById(id);

  document.querySelectorAll('.goal-opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      document.querySelectorAll('.goal-opt').forEach(o=>o.classList.remove('active'));
      opt.classList.add('active');
    });
  });

  ['age','weight','height','activity'].forEach(id=>{
    $(id).addEventListener('input', calculate);
    $(id).addEventListener('change', calculate);
  });
  document.querySelectorAll('input[name=goal]').forEach(r=> r.addEventListener('change', calculate));

  const proteinSlider = $('proteinSlider');
  const carbSlider = $('carbSlider');
  const fatSlider = $('fatSlider');
  [proteinSlider, carbSlider, fatSlider].forEach(s=>{
    s.addEventListener('input', ()=>{
      $('proteinPctLabel').textContent = proteinSlider.value + '%';
      $('carbPctLabel').textContent = carbSlider.value + '%';
      $('fatPctLabel').textContent = fatSlider.value + '%';
      calculate();
    });
  });

  function calculate(){
    let age = parseFloat($('age').value) || 0;
    let weight = parseFloat($('weight').value) || 0;
    let height = parseFloat($('height').value) || 0;
    const activity = parseFloat($('activity').value);
    const goal = parseFloat(document.querySelector('input[name=goal]:checked').value);

    if(weight <= 0 || height <= 0 || age <= 0){
      $('bmrVal').textContent = '—';
      $('tdeeVal').textContent = '—';
      $('adjVal').textContent = '—';
      $('targetCals').textContent = '—';
      return;
    }

    // Mifflin-St Jeor (male constant)
    let bmr = 10*weight + 6.25*height - 5*age + 5;
    const tdee = bmr * activity;
    const target = Math.max(1000, tdee + goal);

    $('bmrVal').textContent = Math.round(bmr).toLocaleString() + ' kcal';
    $('tdeeVal').textContent = Math.round(tdee).toLocaleString() + ' kcal';
    $('adjVal').textContent = (goal > 0 ? '+' : '') + Math.round(goal).toLocaleString() + ' kcal';
    $('targetCals').textContent = Math.round(target).toLocaleString();

    const circumference = 590.6;
    const pct = Math.min(1, Math.max(0, (target - 1200) / (4000 - 1200)));
    $('dialRing').setAttribute('stroke-dashoffset', (circumference * (1 - pct)).toFixed(1));

    // Macro percentages from sliders, normalized to always total 100
    const rawP = parseFloat(proteinSlider.value);
    const rawC = parseFloat(carbSlider.value);
    const rawF = parseFloat(fatSlider.value);
    const rawSum = rawP + rawC + rawF;
    const sumNote = $('sumNote');
    if(rawSum === 100){
      sumNote.textContent = 'Total: 100%';
      sumNote.classList.remove('warn');
    } else {
      sumNote.textContent = `Total: ${rawSum}% — normalized to 100%`;
      sumNote.classList.add('warn');
    }
    const pPct = (rawP / rawSum) * 100;
    const cPct = (rawC / rawSum) * 100;
    const fPct = (rawF / rawSum) * 100;

    const proteinCals = target * (pPct/100);
    const carbCals = target * (cPct/100);
    const fatCals = target * (fPct/100);
    $('proteinG').textContent = Math.round(proteinCals / 4);
    $('carbG').textContent = Math.round(carbCals / 4);
    $('fatG').textContent = Math.round(fatCals / 9);
  }

  calculate();
</script>
</body>
</html>
